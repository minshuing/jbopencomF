<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발표자 화면</title>
  ./styles.css
</head>
<body class="presenter-body">
  <header class="topbar white-topbar">
    <div>
      <div class="brand-chip brand-red">PRESENTER VIEW</div>
      <h1>발표자 화면</h1>
      <div class="sub-info">
        Room: <span id="roomBadge">-</span>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="copyMobileLinkBtn" class="secondary-btn">모바일 링크 복사</button>
      <button id="clearChatBtn" class="ghost-btn">채팅 전체 삭제</button>
    </div>
  </header>

  <main class="presenter-layout large-slide-layout">
    <section class="slide-panel white-panel">
      <div class="slide-wrapper large-slide-wrapper">
        <img id="slideImage" class="slide-image" alt="슬라이드 이미지" />
        <div id="slideFallback" class="slide-fallback hidden">
          <h2>슬라이드를 불러오지 못했습니다.</h2>
          <p>
            <code>slides/slides.json</code> 파일과 이미지 파일명을 확인해 주세요.
          </p>
        </div>
      </div>

      <div class="slide-controls">
        <button id="prevBtn" class="ghost-btn">이전</button>
        <div class="slide-indicator" id="slideIndicator">0 / 0</div>
        <button id="nextBtn" class="primary-btn">다음</button>
      </div>

      <div class="bottom-widgets">
        <div class="progress-card white-subpanel">
          <div class="widget-title">Progress</div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div id="progressText" class="progress-text">0%</div>
        </div>

        <div class="memo-card white-subpanel">
          <div class="widget-title">발표자 급한 메모</div>
          <textarea id="memoInput" placeholder="발표 중 급하게 메모할 내용을 적어두세요. 이 메모는 발표자 브라우저에만 저장됩니다."></textarea>
        </div>
      </div>
    </section>

    <aside class="chat-panel white-panel slim-chat-panel">
      <div class="chat-header white-chat-header">
        <div>
          <h2>실시간 채팅</h2>
          <div class="small-muted">모바일 참여자의 익명 메시지</div>
        </div>
        <span class="live-badge">LIVE</span>
      </div>

      <div class="link-inline-box">
        <div class="small-label">참여자 접속 링크</div>
        <code id="mobileLinkText">-</code>
      </div>

      <div id="chatList" class="chat-list"></div>
    </aside>
  </main>

  ./presenter.jsscript>
</body>
</html>
